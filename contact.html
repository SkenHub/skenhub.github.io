<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>お問い合わせ - 舞鶴高専 創造技術研究会 (S-ken)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Simple Navbar (static links) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="sken.jpg" alt="S-ken ロゴ" class="logo-img me-2" />
          <span>S-ken</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">トップ</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html?p=teams">班紹介</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">お問い合わせ</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5 pt-4">
      <section class="mb-5">
        <h1>お問い合わせ</h1>
        <p class="text-muted">活動内容や入部希望などお気軽にご連絡ください。</p>
        <div class="row g-4">
          <div class="col-md-6">
            <div class="card h-100">
              <div class="card-body">
                <h3 class="h5">メール</h3>
                <p>
                  <a href="mailto:skenmail2013@gmail.com" class="link-primary">skenmail2013@gmail.com</a>
                </p>
                <p class="small text-muted">返信には数日いただく場合があります。できればXのDMでご連絡ください。</p>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card h-100">
              <div class="card-body">
                <h3 class="h5">X (旧Twitter)</h3>
                <p>
                  ダイレクトメッセージでも受け付けています。
                </p>
                <a href="https://twitter.com/mnct_sken" target="_blank" rel="noopener" class="btn btn-outline-info">Xで連絡する</a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section>
        <h2>よくあるご質問</h2>
        <div class="accordion" id="faq">
          <div class="accordion-item">
            <h2 class="accordion-header" id="q1">
              <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#a1" aria-expanded="true" aria-controls="a1">
                見学は可能ですか？
              </button>
            </h2>
            <div id="a1" class="accordion-collapse collapse show" aria-labelledby="q1" data-bs-parent="#faq">
              <div class="accordion-body">はい、随時受け付けています。メールまたはXでご連絡ください。</div>
            </div>
          </div>
          <div class="accordion-item">
            <h2 class="accordion-header" id="q2">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#a2" aria-expanded="false" aria-controls="a2">
                経験がなくても大丈夫？
              </button>
            </h2>
            <div id="a2" class="accordion-collapse collapse" aria-labelledby="q2" data-bs-parent="#faq">
              <div class="accordion-body">大歓迎です。基礎から丁寧にサポートします。</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-dark text-white text-center p-3 mt-5">
      <div class="mb-2">
        <img src="sken.jpg" alt="S-ken ロゴ" class="logo-img footer-logo" />
      </div>
      <p class="mb-0">&copy; 2025 舞鶴高専 創造技術研究会 (S-ken) All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
